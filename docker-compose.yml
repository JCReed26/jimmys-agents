services:
  gmail-agent:
    build:
      context: .
      dockerfile: gmail-agent/Dockerfile
    ports:
      - "8001:8000"
    env_file: .env
    volumes:
      - ./secrets:/app/secrets:ro
      - ./data:/app/data

  calendar-agent:
    build:
      context: .
      dockerfile: calendar-agent/Dockerfile
    ports:
      - "8002:8000"
    env_file: .env
    volumes:
      - ./secrets:/app/secrets:ro

  budget-agent:
    build:
      context: .
      dockerfile: budget-agent/Dockerfile
    ports:
      - "8003:8000"
    env_file: .env
    volumes:
      - ./secrets:/app/secrets:ro
      - ./data:/app/data

  ticktick-agent:
    build:
      context: .
      dockerfile: ticktick-agent/Dockerfile
    ports:
      - "8004:8000"
    env_file: .env
    volumes:
      - ./secrets:/app/secrets
    environment:
      - TICKTICK_TOKEN_PATH=/app/secrets/.token-oauth

  a-dashboard:
    build:
      context: .
      dockerfile: a-dashboard/Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - ./data:/app/data:ro
    environment:
      - AGENT_GMAIL_URL=http://gmail-agent:8000
      - AGENT_CALENDAR_URL=http://calendar-agent:8000
      - AGENT_BUDGET_URL=http://budget-agent:8000
      - AGENT_TICKTICK_URL=http://ticktick-agent:8000
      - METRICS_DB_PATH=/app/data/metrics.db
